services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: neurosync
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neurosync}
      POSTGRES_DB: neurosync
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neurosync"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build: ./api
    expose:
      - "4000"
    env_file: .env
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://neurosync:${POSTGRES_PASSWORD:-neurosync}@db:5432/neurosync
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build: ./web
    expose:
      - "80"
    depends_on:
      - api
    restart: unless-stopped

  docs:
    build: ./docs
    expose:
      - "80"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/active.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
