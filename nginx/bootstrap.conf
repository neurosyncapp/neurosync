# HTTP-only config used before TLS certs exist. Serves the ACME challenge and
# proxies traffic so the site works during cert issuance.
map $host $upstream {
    default                 web;
    docs.neuro-sync.app     docs;
}

map $http_user_agent $agent_card_prerender {
    default 0;
    ~*(Twitterbot|facebookexternalhit|Facebot|Slackbot|Discordbot|TelegramBot|LinkedInBot|WhatsApp|SkypeUriPreview|bot|crawler|spider) 1;
}

server {
    listen 80;
    server_name neuro-sync.app www.neuro-sync.app docs.neuro-sync.app;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location = /docs { return 301 http://docs.neuro-sync.app; }
    location /docs/ { return 301 http://docs.neuro-sync.app; }

    location /api/ {
        proxy_pass http://api:4000/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /agent/ {
        if ($agent_card_prerender) {
            rewrite ^/agent/(.+)$ /__agent_card/$1 last;
        }
        proxy_pass http://$upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /__agent_card/ {
        internal;
        rewrite ^/__agent_card/(.+)$ /share/agent/$1 break;
        proxy_pass http://api:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://$upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
