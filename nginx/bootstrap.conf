# HTTP-only config used before TLS certs exist. Serves the ACME challenge and
# proxies traffic so the site works during cert issuance.
map $host $upstream {
    default                 web;
    docs.neuro-sync.app     docs;
}

server {
    listen 80;
    server_name neuro-sync.app www.neuro-sync.app docs.neuro-sync.app;

    location /.well-known/acme-challenge/ {
