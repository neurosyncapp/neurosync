# Production edge config: TLS termination + host-based routing.
#   neuro-sync.app, www.neuro-sync.app  -> web   (main SPA)
#   docs.neuro-sync.app                 -> docs  (documentation)
#   /api/                               -> api   (NestJS)

map $host $upstream {
    default                 web;
    docs.neuro-sync.app     docs;
}

# HTTP: serve ACME challenge, redirect everything else to HTTPS.
server {
    listen 80;
    server_name neuro-sync.app www.neuro-sync.app docs.neuro-sync.app;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# Redirect apex-less and www to apex on HTTPS.
server {
    listen 443 ssl;
    http2 on;
    server_name www.neuro-sync.app;

    ssl_certificate     /etc/letsencrypt/live/neuro-sync.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/neuro-sync.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    return 301 https://neuro-sync.app$request_uri;
}

# Main app + API.
server {
    listen 443 ssl;
    http2 on;
    server_name neuro-sync.app;

    ssl_certificate     /etc/letsencrypt/live/neuro-sync.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/neuro-sync.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    client_max_body_size 2m;

    # /docs lives on its own subdomain.
    location = /docs { return 301 https://docs.neuro-sync.app; }
    location /docs/ { return 301 https://docs.neuro-sync.app; }

    location /api/ {
        proxy_pass http://api:4000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://web;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

