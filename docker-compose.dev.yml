# Local development: db + api only. Run the web and docs frontends with
# `npm run dev` (they proxy /api to localhost:4000).
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: neurosync
      POSTGRES_PASSWORD: neurosync
      POSTGRES_DB: neurosync
    ports:
      - "5432:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data

  api:
    build: ./api
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://neurosync:neurosync@db:5432/neurosync
    dns:
      - 8.8.8.8
    depends_on:
      - db

volumes:
  pgdata-dev:
